[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.partitions = dialboard_16MB.csv
board_build.filesystem = littlefs   # image data/ (designer+schema) en LittleFS
lib_deps =
    lvgl/lvgl@9.5.0
    bblanchon/ArduinoJson@^7.0.0
    adafruit/Adafruit NeoPixel
# esp_lcd_touch + esp_lcd_touch_cst816s sont vendorises dans lib/ (absents du registre PlatformIO).
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -Isrc
    -DCONFIG_ESP_LCD_TOUCH_MAX_POINTS=1
    -DCONFIG_ESP_LCD_TOUCH_MAX_BUTTONS=0

# Tests du coeur logique pur (aucune dependance HW/LVGL).
[env:native]
platform = native
test_framework = unity
test_build_src = yes
lib_deps = bblanchon/ArduinoJson@^7.0.0
build_src_filter = -<*> +<dashboard.cpp> +<format.cpp> +<color.cpp> +<nav_logic.cpp> +<context.cpp> +<asset_path.cpp> +<sink.cpp> +<wifi_list.cpp> +<clock_geom.cpp> +<ring_geom.cpp> +<stepper_logic.cpp> +<segmented_logic.cpp> +<fonts/icons_gen.c>
build_flags = -DRT_NATIVE_TEST -Isrc -std=gnu++17 '-DRT_SCHEMA_PATH="${PROJECT_DIR}/schema/layout.schema.json"'
