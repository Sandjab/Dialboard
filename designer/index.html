<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dialboard — Designer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Dialboard Designer</h1>
    <span class="grow"></span>
    <!-- Historique -->
    <div class="hgroup">
      <button id="undo" disabled title="Annuler (Ctrl+Z)">↶ Undo</button>
      <button id="redo" disabled title="Rétablir">↷ Redo</button>
    </div>
    <!-- Device — I/O du layout (lecture/écriture) : tout dépend du champ URL -->
    <div class="hgroup">
      <label>Device <input id="base" type="text" placeholder="http://192.168.1.35" size="20" /></label>
      <button id="load" class="accent" title="Lit le layout actuel du device (GET /layout)">Charger</button>
      <button id="push" class="primary" title="Écrit le layout dans la mémoire persistante du device (POST /layout)">Pousser</button>
    </div>
    <!-- Device — inspection / test (ne modifie pas le layout) -->
    <div class="hgroup">
      <button id="values" title="Pousse les valeurs d'aperçu (mocks) au device via POST /update">Valeurs test</button>
      <button id="statusbtn" title="Lit GET /status (santé device + état des sources)">Statut</button>
      <button id="capture" title="Capture l'écran du device (GET /screenshot)">Capture écran</button>
    </div>
    <!-- Fichier local -->
    <div class="hgroup">
      <button id="export" title="Enregistre le layout dans un fichier .json local">Exporter</button>
      <button id="import" title="Charge un layout depuis un fichier .json local">Importer</button>
      <input id="import-file" type="file" accept="application/json,.json" hidden />
    </div>
    <div class="hgroup">
      <button id="drawer-toggle" type="button" title="Plomberie I/O : sorties physiques (led_ring/sound) + sources pull">⚙ Device</button>
    </div>
    <span id="dev-pill" class="dev-pill" title="Aucune requête device effectuée">○ non vérifié</span>
  </header>

  <main>
    <div class="dock-left">
      <aside id="palette" class="col"><h2>Palette</h2></aside>
      <aside id="layers" class="col"><h2>Calques</h2></aside>
    </div>
    <section id="canvas-col" class="col">
      <h2>Canvas</h2>
      <div id="stage-wrap" class="stage-wrap">
        <div id="stage" class="stage">
          <div class="screen-circle"></div>
        </div>
      </div>
    </section>
    <aside id="inspector" class="col"><h2>Inspecteur</h2></aside>
  </main>

  <div id="statusbar" class="statusbar">
    <!-- contexte (gauche) + validation injectés par statusbar.js ; zoom (display-only) câblé par app.js -->
    <label class="sb-zoom">Zoom
      <select id="zoom" title="Échelle d'affichage du canvas (n'affecte pas le layout)">
        <option value="1">1×</option>
        <option value="1.5">1,5×</option>
        <option value="2">2×</option>
      </select>
    </label>
  </div>

  <section id="console" class="console"><!-- bandeau + corps injectés par console.js --></section>

  <aside id="drawer" class="drawer" hidden>
    <div class="drawer-backdrop"></div>
    <div class="drawer-panel" role="dialog" aria-label="Device">
      <div class="drawer-head">
        <h2>Device</h2>
        <button class="drawer-close" type="button" title="Fermer">✕</button>
      </div>
      <div class="drawer-tabs">
        <button class="drawer-tab" type="button" data-tab="device">Sorties physiques</button>
        <button class="drawer-tab" type="button" data-tab="sources">Sources pull</button>
      </div>
      <div id="device-pane" class="drawer-pane">
        <div id="device" class="sources-panel"></div>
      </div>
      <div id="sources-pane" class="drawer-pane">
        <div id="sources" class="sources-panel"></div>
      </div>
    </div>
  </aside>

  <div id="shot-overlay" class="shot-overlay" hidden>
    <div class="shot-box">
      <img id="shot" alt="Capture écran du device" />
      <div class="shot-nav">
        <button id="shot-prev" title="Page précédente sur le device">◀</button>
        <span id="shot-page"></span>
        <button id="shot-next" title="Page suivante sur le device">▶</button>
        <button id="shot-close">Fermer</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
