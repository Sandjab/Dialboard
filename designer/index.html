<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dialboard — Designer</title>
  <!-- Favicon inline (anneau violet du device) : évite la requête auto /favicon.ico → 404, en local ET sur le device (LittleFS). -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%23FF9F40' stroke-width='5'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="tb-brand">
      <svg class="tb-brand-mark" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
        <line x1="12" y1="2" x2="12" y2="5" stroke="currentColor" stroke-width="2"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
      </svg>
      <span class="tb-brand-name">Dialboard</span>
    </div>
    <!-- Fichier local -->
    <div class="tb-group">
      <button id="export" class="tb-btn" data-i18n-tip="toolbar.export.tip" data-i18n-title="toolbar.export.title" data-tip="Exporter JSON" title="Enregistre le layout dans un fichier .json local"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2.5h5l3 3v8H4z"/><path d="M9 2.5v3h3"/><path d="M8 7v3.6M6.4 9l1.6 1.6L9.6 9"/></svg></button>
      <button id="import" class="tb-btn" data-i18n-tip="toolbar.import.tip" data-i18n-title="toolbar.import.title" data-tip="Importer JSON" title="Charge un layout depuis un fichier .json local"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2.5h5l3 3v8H4z"/><path d="M9 2.5v3h3"/><path d="M8 11.1V7.5M6.4 9.1L8 7.5l1.6 1.6"/></svg></button>
      <button id="export-bundle" class="tb-btn" data-i18n-tip="toolbar.export_bundle.tip" data-i18n-title="toolbar.export_bundle.title" data-tip="Exporter .dboard" title="Enregistre le layout + images dans un fichier .dboard local"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="5.5" width="11" height="8" rx="1"/><path d="M2.5 5.5L8 2.5l5.5 3"/><path d="M8 7.4v4.2M6.4 10L8 11.6 9.6 10"/></svg></button>
      <button id="import-bundle" class="tb-btn" data-i18n-tip="toolbar.import_bundle.tip" data-i18n-title="toolbar.import_bundle.title" data-tip="Importer .dboard" title="Charge un layout + images depuis un fichier .dboard local"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="5.5" width="11" height="8" rx="1"/><path d="M2.5 5.5L8 2.5l5.5 3"/><path d="M8 11.6V7.4M6.4 9 8 7.4 9.6 9"/></svg></button>
      <input id="import-bundle-file" type="file" accept=".dboard,application/json" hidden />
      <input id="import-file" type="file" accept="application/json,.json" hidden />
    </div>
    <!-- Historique -->
    <div class="tb-group">
      <button id="undo" class="tb-btn" disabled data-i18n-tip="toolbar.undo.tip" data-i18n-title="toolbar.undo.title" data-tip="Annuler (Ctrl+Z)" title="Annuler (Ctrl+Z)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7h8a3 3 0 010 6H6M3 7l3-3M3 7l3 3"/></svg></button>
      <button id="redo" class="tb-btn" disabled data-i18n-tip="toolbar.redo.tip" data-i18n-title="toolbar.redo.title" data-tip="Rétablir" title="Rétablir"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 7H5a3 3 0 000 6h5M13 7l-3-3M13 7l-3 3"/></svg></button>
    </div>
    <!-- Device — I/O du layout (lecture/écriture) + inspection / test -->
    <div class="tb-group">
      <button id="load" class="tb-btn accent" data-i18n-tip="toolbar.load.tip" data-i18n-title="toolbar.load.title" data-tip="Charger (GET /layout)" title="Lit le layout actuel du device (GET /layout)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M8 4.8v4M6.2 7l1.8 1.8L9.8 7"/></svg></button>
      <button id="push" class="tb-btn primary" data-i18n-tip="toolbar.push.tip" data-i18n-title="toolbar.push.title" data-tip="Pousser (POST /layout)" title="Écrit le layout dans la mémoire persistante du device (POST /layout)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M8 11.2v-4M6.2 9L8 7.2 9.8 9"/></svg></button>
      <button id="values" class="tb-btn" data-i18n-tip="toolbar.values.tip" data-i18n-title="toolbar.values.title" data-tip="Valeurs test (POST /update)" title="Pousse les valeurs d'aperçu (mocks) au device via POST /update"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg></button>
      <button id="statusbtn" class="tb-btn" data-i18n-tip="toolbar.status.tip" data-i18n-title="toolbar.status.title" data-tip="Statut (GET /status)" title="Lit GET /status (santé device + état des sources)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 9h3l2-5 2 9 2-4h3"/></svg></button>
      <button id="capture" class="tb-btn" data-i18n-tip="toolbar.capture.tip" data-i18n-title="toolbar.capture.title" data-tip="Capture écran (GET /screenshot)" title="Capture l'écran du device (GET /screenshot)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="12" height="9"/><circle cx="8" cy="8.5" r="2.2"/><rect x="6" y="2.5" width="4" height="1.5"/></svg></button>
    </div>
    <!-- Tiroir Sources -->
    <div class="tb-group">
      <button id="drawer-toggle" class="tb-btn" type="button" data-i18n-tip="toolbar.device.tip" data-i18n-title="toolbar.device.title" data-tip="Sources (pull)" title="Sources pull"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M12.5 3.5l-1.4 1.4M4.9 11.1l-1.4 1.4"/></svg></button>
      <button id="sinks-toggle" class="tb-btn" type="button" data-i18n-tip="toolbar.sinks.tip" data-i18n-title="toolbar.sinks.title" data-tip="Sinks (push)" title="Sinks : push réactif"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v7"/><path d="M5 6l3 3 3-3"/><path d="M2 11v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2"/></svg></button>
    </div>
    <!-- Réglages -->
    <div class="tb-group">
      <button id="settings-toggle" class="tb-btn" type="button" data-i18n-tip="toolbar.settings.tip" data-i18n-title="toolbar.settings.title" data-tip="Réglages" title="Réglages du designer (transparence, grille, snap…)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h6M11 4h3M2 8h3M8 8h6M2 12h8M13 12h1"/><circle cx="9.5" cy="4" r="1.6"/><circle cx="6.5" cy="8" r="1.6"/><circle cx="11.5" cy="12" r="1.6"/></svg></button>
    </div>
    <span class="grow"></span>
    <!-- URL device + pastille connexion -->
    <div class="tb-url">
      <label for="base" data-i18n="toolbar.device_url.label">Device</label>
      <input id="base" type="text" data-i18n-placeholder="toolbar.device_url.ph" placeholder="http://192.168.1.35" size="20" />
    </div>
    <span id="dev-pill" class="dev-pill" data-i18n="pill.untested" data-i18n-title="pill.untested.title" title="Aucune requête device effectuée">○ non vérifié</span>
  </header>

  <main>
    <aside id="layers" class="col"><h2 data-i18n="panel.layers">Calques</h2></aside>
    <section id="canvas-col" class="col">
      <h2 data-i18n="panel.canvas">Canvas</h2>
      <div class="canvas-hint" data-i18n="canvas.drag_hint">Glissez un composant sur l'écran</div>
      <div id="board-fit" class="board-fit">
        <div id="board" class="board">
          <svg id="zones-svg" class="zones-svg" aria-hidden="true"></svg>
          <div id="stage" class="stage">
            <div class="screen-circle"></div>
            <div id="stage-grid" aria-hidden="true"></div>
          </div>
          <!-- 4 zones d'icônes injectées par canvas-zones.js -->
        </div>
      </div>
      <div id="carousel" class="carousel"><!-- vignettes de pages injectées par carousel.js --></div>
      <!-- Console logée dans la colonne canvas (sous le carousel, bornée par layers/inspector) plutôt
           qu'en bande pleine largeur ; le board grandit pour combler le haut (cf. app.js applyScale). -->
      <section id="console" class="console"><!-- bandeau + corps injectés par console.js --></section>
    </section>
    <aside id="inspector" class="col"><h2 data-i18n="panel.inspector">Inspecteur</h2></aside>
  </main>

  <div id="statusbar" class="statusbar">
    <!-- contexte (gauche) + validation injectés par statusbar.js -->
  </div>

  <aside id="drawer" class="drawer" hidden>
    <div class="drawer-backdrop"></div>
    <div class="drawer-panel" role="dialog" aria-label="Sources" data-i18n-aria-label="drawer.sources.aria">
      <div class="drawer-head">
        <h2 data-i18n="drawer.sources.title">Sources</h2>
        <button class="drawer-close" type="button" data-i18n-title="drawer.close" title="Fermer">✕</button>
      </div>
      <div id="sources-pane" class="drawer-pane">
        <div id="sources" class="sources-panel"></div>
      </div>
    </div>
  </aside>

  <aside id="sinks-drawer" class="drawer" hidden>
    <div class="drawer-backdrop"></div>
    <div class="drawer-panel" role="dialog" aria-label="Sinks" data-i18n-aria-label="drawer.sinks.aria">
      <div class="drawer-head">
        <h2 data-i18n="drawer.sinks.title">Sinks</h2>
        <button class="drawer-close" type="button" data-i18n-title="drawer.close" title="Fermer">✕</button>
      </div>
      <div id="sinks-pane" class="drawer-pane">
        <div id="sinks" class="sources-panel"></div>
      </div>
    </div>
  </aside>

  <aside id="settings-drawer" class="drawer" hidden>
    <div class="drawer-backdrop"></div>
    <div class="drawer-panel" role="dialog" aria-label="Réglages" data-i18n-aria-label="drawer.settings.aria">
      <div class="drawer-head">
        <h2 data-i18n="drawer.settings.title">Réglages</h2>
        <button class="drawer-close" type="button" data-i18n-title="drawer.close" title="Fermer">✕</button>
      </div>
      <div id="settings-pane" class="drawer-pane">
        <div id="settings" class="settings-panel"></div>
      </div>
    </div>
  </aside>

  <div id="shot-overlay" class="shot-overlay" hidden>
    <div class="shot-box">
      <img id="shot" data-i18n-alt="shot.alt" alt="Capture écran du device" />
      <div class="shot-nav">
        <button id="shot-prev" data-i18n-title="shot.prev" title="Page précédente sur le device">◀</button>
        <span id="shot-page"></span>
        <button id="shot-next" data-i18n-title="shot.next" title="Page suivante sur le device">▶</button>
        <button id="shot-close" data-i18n="shot.close">Fermer</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
