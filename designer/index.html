<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dialboard — Designer</title>
  <!-- Favicon inline (anneau violet du device) : évite la requête auto /favicon.ico → 404, en local ET sur le device (LittleFS). -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%23FF9F40' stroke-width='5'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="tb-brand">
      <svg class="tb-brand-mark" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
        <line x1="12" y1="2" x2="12" y2="5" stroke="#FF9F40" stroke-width="2"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
      </svg>
      <span class="tb-brand-name">Dialboard</span>
    </div>
    <!-- Fichier local -->
    <div class="tb-group">
      <button id="export" class="tb-btn" data-tip="Exporter JSON" title="Enregistre le layout dans un fichier .json local"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v9M4 7l4 4 4-4M2 14h12" transform="rotate(180 8 8)"/></svg></button>
      <button id="import" class="tb-btn" data-tip="Importer JSON" title="Charge un layout depuis un fichier .json local"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 11V2M4 7l4 4 4-4M2 14h12"/></svg></button>
      <input id="import-file" type="file" accept="application/json,.json" hidden />
    </div>
    <!-- Historique -->
    <div class="tb-group">
      <button id="undo" class="tb-btn" disabled data-tip="Annuler (Ctrl+Z)" title="Annuler (Ctrl+Z)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7h8a3 3 0 010 6H6M3 7l3-3M3 7l3 3"/></svg></button>
      <button id="redo" class="tb-btn" disabled data-tip="Rétablir" title="Rétablir"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 7H5a3 3 0 000 6h5M13 7l-3-3M13 7l-3 3"/></svg></button>
    </div>
    <!-- Device — I/O du layout (lecture/écriture) + inspection / test -->
    <div class="tb-group">
      <button id="load" class="tb-btn accent" data-tip="Charger (GET /layout)" title="Lit le layout actuel du device (GET /layout)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 10V2M5 5l3-3 3 3"/><rect x="2.5" y="10" width="11" height="4"/></svg></button>
      <button id="push" class="tb-btn primary" data-tip="Pousser (POST /layout)" title="Écrit le layout dans la mémoire persistante du device (POST /layout)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8M5 7l3 3 3-3"/><rect x="2.5" y="12" width="11" height="2"/></svg></button>
      <button id="values" class="tb-btn" data-tip="Valeurs test (POST /update)" title="Pousse les valeurs d'aperçu (mocks) au device via POST /update"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg></button>
      <button id="statusbtn" class="tb-btn" data-tip="Statut (GET /status)" title="Lit GET /status (santé device + état des sources)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 9h3l2-5 2 9 2-4h3"/></svg></button>
      <button id="capture" class="tb-btn" data-tip="Capture écran (GET /screenshot)" title="Capture l'écran du device (GET /screenshot)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="12" height="9"/><circle cx="8" cy="8.5" r="2.2"/><rect x="6" y="2.5" width="4" height="1.5"/></svg></button>
    </div>
    <!-- Tiroir Device -->
    <div class="tb-group">
      <button id="drawer-toggle" class="tb-btn" type="button" data-tip="Device (sorties physiques / sources)" title="Plomberie I/O : sorties physiques (led_ring/sound) + sources pull"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M12.5 3.5l-1.4 1.4M4.9 11.1l-1.4 1.4"/></svg></button>
    </div>
    <span class="grow"></span>
    <!-- URL device + pastille connexion -->
    <div class="tb-url">
      <label for="base">Device</label>
      <input id="base" type="text" placeholder="http://192.168.1.35" size="20" />
    </div>
    <span id="dev-pill" class="dev-pill" title="Aucune requête device effectuée">○ non vérifié</span>
  </header>

  <main>
    <aside id="palette" class="col col-palette"><h2>Palette</h2></aside>
    <aside id="layers" class="col"><h2>Calques</h2></aside>
    <section id="canvas-col" class="col">
      <h2>Canvas</h2>
      <div id="stage-wrap" class="stage-wrap">
        <div id="stage" class="stage">
          <div class="screen-circle"></div>
        </div>
      </div>
      <div id="carousel" class="carousel"><!-- vignettes de pages injectées par carousel.js --></div>
    </section>
    <aside id="inspector" class="col"><h2>Inspecteur</h2></aside>
  </main>

  <div id="statusbar" class="statusbar">
    <!-- contexte (gauche) + validation injectés par statusbar.js ; zoom (display-only) câblé par app.js -->
    <label class="sb-zoom">Zoom
      <select id="zoom" title="Échelle d'affichage du canvas (n'affecte pas le layout)">
        <option value="1">1×</option>
        <option value="1.5">1,5×</option>
        <option value="2">2×</option>
      </select>
    </label>
  </div>

  <section id="console" class="console"><!-- bandeau + corps injectés par console.js --></section>

  <aside id="drawer" class="drawer" hidden>
    <div class="drawer-backdrop"></div>
    <div class="drawer-panel" role="dialog" aria-label="Device">
      <div class="drawer-head">
        <h2>Device</h2>
        <button class="drawer-close" type="button" title="Fermer">✕</button>
      </div>
      <div class="drawer-tabs">
        <button class="drawer-tab" type="button" data-tab="device">Sorties physiques</button>
        <button class="drawer-tab" type="button" data-tab="sources">Sources pull</button>
      </div>
      <div id="device-pane" class="drawer-pane">
        <div id="device" class="sources-panel"></div>
      </div>
      <div id="sources-pane" class="drawer-pane">
        <div id="sources" class="sources-panel"></div>
      </div>
    </div>
  </aside>

  <div id="shot-overlay" class="shot-overlay" hidden>
    <div class="shot-box">
      <img id="shot" alt="Capture écran du device" />
      <div class="shot-nav">
        <button id="shot-prev" title="Page précédente sur le device">◀</button>
        <span id="shot-page"></span>
        <button id="shot-next" title="Page suivante sur le device">▶</button>
        <button id="shot-close">Fermer</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
