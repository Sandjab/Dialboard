# Publie la landing, le manuel et le designer WYSIWYG sur GitHub Pages.
#
# La racine du site sert la landing (site/) ; docs/ publie le manuel public
# (index.html + assets, hors _internal/ et superpowers/) ; designer/ + schema/
# restent publiés (pas le firmware). Le schema reste un cran au-dessus de
# designer/ pour que le fetch('../schema/layout.schema.json') de app.js
# résolve comme en local.
#
# Limite connue : les boutons « Device » (Charger/Pousser/Capture…) NE marchent
# PAS depuis Pages — page HTTPS vs device HTTP sur le LAN = mixed content bloqué
# par le navigateur. Pages sert l'éditeur ; workflow device = Exporter/Importer.
name: Deploy site to Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/index.html'
      - 'docs/assets/**'
      - 'designer/**'
      - 'schema/**'
      - '.github/workflows/pages.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; ne pas annuler un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble _site (landing + docs + designer + schema)
        run: |
          mkdir -p _site
          # Landing en racine du site (remplace l'ancienne redirection).
          cp -r site/* _site/
          rm -rf _site/tests _site/package.json      # infra de test node, pas de prod
          # Manuel public (exclut _internal gitignoré et superpowers = notes de dev).
          mkdir -p _site/docs
          cp docs/index.html _site/docs/index.html
          cp -r docs/assets   _site/docs/assets
          # Designer + schema (inchangé).
          cp -r designer _site/designer
          cp -r schema   _site/schema
          rm -rf _site/designer/tests _site/designer/package.json

      - name: Fetch latest firmware release into _site/firmware
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _site/firmware
          gh release download --dir _site/firmware --pattern '*' \
            || echo "Pas encore de release firmware — flash USB désactivé jusqu'au premier tag."

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
